<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Acuité Visuelle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;           /* ✅ Réduit à 1px */
            height: 1px;          /* ✅ Réduit à 1px */
            opacity: 0;           /* ✅ Transparent */
            pointer-events: none;
        }
        canvas {
            display: none;
        }
        #letterDisplay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: bold;
            color: white;
            text-shadow: none;
            font-family: Arial, sans-serif;
            opacity: 0;
            transition: none;  /* ✅ PAS DE TRANSITION */
            z-index: 50;
            pointer-events: none;
        }

        #toggleButton {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 50px;
            height: 50px;
            background: rgba(78, 205, 196, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.4);
        }

        #controlPanel {
            position: fixed;
            top: 70px;
            left: 10px;
            background: rgba(0, 0, 0, 0.98);
            color: #4ecdc4;
            padding: 20px;
            border-radius: 12px;
            font-size: 12px;
            z-index: 100;
            width: 300px;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid #4ecdc4;
            transform: translateX(-400px);
            transition: transform 0.3s ease;
        }
        #controlPanel.show {
            transform: translateX(0);
        }

        h3 {
            color: #4ecdc4;
            margin-bottom: 15px;
            font-size: 14px;
            border-bottom: 2px solid #4ecdc4;
            padding-bottom: 8px;
        }
        h4 {
            color: #00ff00;
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .control-group {
            margin: 12px 0;
            padding: 10px;
            background: rgba(78, 205, 196, 0.1);
            border-left: 3px solid #4ecdc4;
            border-radius: 4px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 11px;
            color: #fff;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            cursor: pointer;
            margin-top: 5px;
            accent-color: #4ecdc4;
        }

        input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .stat-line {
            margin: 6px 0;
            padding: 6px 8px;
            background: rgba(0, 255, 0, 0.05);
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #00ff00;
            font-size: 10px;
            word-break: break-all;
            height: 16px;
            line-height: 16px;
        }

        .stat-line.error {
            color: #ff6666;
            background: rgba(255, 100, 100, 0.1);
        }

        .stat-line.success {
            color: #66ff66;
            background: rgba(100, 255, 100, 0.1);
        }

        #status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: #4ecdc4;
            padding: 40px 60px;
            border-radius: 15px;
            font-size: 18px;
            z-index: 200;
            text-align: center;
            border: 2px solid #4ecdc4;
        }

        .dot {
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div id="letterDisplay"></div>

    <button id="toggleButton">⚙️</button>

    <div id="controlPanel">
        <h3>⚙️ Paramètres</h3>
        
        <div class="control-group">
            <label>Acuité visuelle (1/10e): <strong id="sizeVal">6.0</strong></label>
            <input type="range" id="letterSize" min="1" max="20" value="6" step="0.5">
        </div>

        <div class="control-group">
            <label>Affichage (ms): <strong id="dispVal">60</strong></label>
            <input type="range" id="displayTime" min="50" max="500" value="60" step="10">
        </div>

        <div class="control-group">
            <label>Délai entre lettres (ms): <strong id="cooldownVal">1000</strong></label>
            <input type="range" id="cooldown" min="200" max="5000" value="1000" step="100">
        </div>

        <div class="control-group">
            <label>Vitesse min (°/sec): <strong id="minSpeedVal">150</strong></label>
            <input type="range" id="minSpeed" min="50" max="300" value="150" step="10">
        </div>

        <div class="control-group">
            <label>Vitesse max (°/sec): <strong id="maxSpeedVal">300</strong></label>
            <input type="range" id="maxSpeed" min="150" max="500" value="300" step="10">
        </div>

        <div class="control-group">
            <label>Distance réf (cm): <strong id="distVal">50</strong></label>
            <input type="range" id="refDistance" min="20" max="150" value="50" step="5">
        </div>

        <h4>📊 Diagnostic</h4>
        <div class="stat-line" id="statLoad">Chargement...</div>
        <div class="stat-line" id="statVideo">Vidéo: --</div>
        <div class="stat-line" id="statTF">TensorFlow: --</div>
        <div class="stat-line" id="statBlaze">BlazeFace: --</div>
        <div class="stat-line" id="statDetection">Visage: --</div>

        <h4>📊 Statistiques</h4>
        <div class="stat-line" id="statYaw">Yaw: --°</div>
        <div class="stat-line" id="statPitch">Pitch: --°</div>
        <div class="stat-line" id="statAngularSpeed">Vitesse: --°/s</div>
        <div class="stat-line" id="statDistance">Distance: --cm</div>
        <div class="stat-line" id="statLetter">Lettre: --</div>
        <div class="stat-line" id="statSize">Taille: --px</div>
        <div class="stat-line" id="statCooldown">Cooldown: 0ms</div>
        <div class="stat-line" id="statFPS">FPS: 0</div>
        <div class="stat-line" id="statDisplayTime">Affichée: 0ms</div>
    </div>

    <div id="status">
        <div style="font-size: 40px; margin-bottom: 15px;">📷</div>
        <div>Initialisation<span class="dot">...</span></div>
        <div style="font-size: 12px; margin-top: 15px; color: #888;">Chargement des modèles IA...</div>
    </div>

    <!-- TensorFlow.js + BlazeFace -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3"></script>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const letterDisplay = document.getElementById('letterDisplay');
        const statusDiv = document.getElementById('status');
        const controlPanel = document.getElementById('controlPanel');
        const toggleButton = document.getElementById('toggleButton');
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

        // ===== PARAMÈTRES PRINCIPAUX =====
        let displayTime = 60;
        let acuityLevel = 6.0;
        let minSpeed = 150;
        let maxSpeed = 300;
        let refDistance = 50;
        let cooldown = 1000;

        // ===== VARIABLES D'ÉTAT =====
        let fps = 0;
        let frameCount = 0;
        let lastFPSTime = Date.now();
        let currentDistance = 50;
        let currentLetter = '';
        let currentLetterSize = 120;
        let currentAngularSpeed = 0;
        let lastLetterTime = 0;
        let lastLetterDisplayTime = 0;
        let letterDisplayStartTime = 0;

        let lastYaw = null;
        let lastPitch = null;
        let lastYawTime = 0;
        let currentYaw = 0;
        let currentPitch = 0;

        let detector = null;
        let initialized = false;

        // ===== VARIABLES POUR LE LISSAGE =====
        let smoothedYaw = 0;
        let smoothedPitch = 0;
        let smoothedAngularSpeed = 0;
        let movementBuffer = [];
        const BUFFER_SIZE = 5;
        const NOISE_THRESHOLD = 1.5;
        const VELOCITY_THRESHOLD = 2;
        let lastValidYaw = null;
        let lastValidPitch = null;

        function log(id, msg, type = 'normal') {
            console.log(msg);
            const el = document.getElementById(id);
            if (el) {
                el.textContent = msg;
                el.classList.remove('error', 'success');
                if (type === 'error') el.classList.add('error');
                if (type === 'success') el.classList.add('success');
            }
        }

        toggleButton.addEventListener('click', () => {
            controlPanel.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (e.target !== toggleButton && !controlPanel.contains(e.target)) {
                controlPanel.classList.remove('show');
            }
        });

        // ===== INITIALISER BLAZEFACE =====
        async function initBlazeFace() {
            try {
                log('statTF', '⏳ Chargement TensorFlow...');
                await tf.ready();
                log('statTF', '✅ TensorFlow prêt', 'success');

                log('statBlaze', '⏳ Chargement BlazeFace...');
                detector = await blazeface.load();
                log('statBlaze', '✅ BlazeFace chargé', 'success');
                
                return true;
            } catch (err) {
                log('statBlaze', `❌ ${err.message}`, 'error');
                return false;
            }
        }

        // ===== CALCULER LES ANGLES =====
        function calculateHeadAngles(landmarks) {
            if (!landmarks || landmarks.length < 6) {
                return null;
            }

            try {
                const leftEye = landmarks[0];
                const rightEye = landmarks[1];
                const mouth = landmarks[3];
                const leftEar = landmarks[4];
                const rightEar = landmarks[5];

                const eyeCenterX = (leftEye[0] + rightEye[0]) / 2;
                const earCenterX = (leftEar[0] + rightEar[0]) / 2;
                const yawAngle = ((eyeCenterX - earCenterX) / 100) * 90;

                const eyeCenterY = (leftEye[1] + rightEye[1]) / 2;
                const mouthY = mouth[1];
                const pitchAngle = ((eyeCenterY - mouthY) / 100) * 60;

                return {
                    yaw: yawAngle,
                    pitch: pitchAngle
                };
            } catch (err) {
                console.error('Erreur angles:', err);
                return null;
            }
        }

        // ===== FILTRE BRUIT =====
        function isNoise(newYaw, newPitch, lastYaw, lastPitch) {
            if (lastYaw === null || lastPitch === null) return false;
            
            const yawDelta = Math.abs(newYaw - lastYaw);
            const pitchDelta = Math.abs(newPitch - lastPitch);
            
            const normalizeAngle = (d) => d > 90 ? 180 - d : d;
            const normalizedYaw = normalizeAngle(yawDelta);
            const normalizedPitch = normalizeAngle(pitchDelta);
            
            return normalizedYaw < NOISE_THRESHOLD && normalizedPitch < NOISE_THRESHOLD;
        }

        // ===== LISSAGE EXPONENTIEL =====
        function smoothValue(newValue, smoothedValue, alpha = 0.3) {
            return smoothedValue * (1 - alpha) + newValue * alpha;
        }

        // ===== VITESSE ANGULAIRE AMÉLIORÉE =====
        function calculateAngularVelocityImproved(newYaw, newPitch, timeDelta) {
            if (lastValidYaw === null || lastValidPitch === null) {
                lastValidYaw = newYaw;
                lastValidPitch = newPitch;
                return 0;
            }

            if (timeDelta < 30) return 0;

            // Ignorer le bruit
            if (isNoise(newYaw, newPitch, lastValidYaw, lastValidPitch)) {
                return smoothedAngularSpeed;
            }

            const deltaYaw = Math.abs(newYaw - lastValidYaw);
            const deltaPitch = Math.abs(newPitch - lastValidPitch);

            const normalizeAngle = (d) => d > 90 ? 180 - d : d;
            const normalizedYaw = normalizeAngle(deltaYaw);
            const normalizedPitch = normalizeAngle(deltaPitch);

            const totalAngularSpeed = (normalizedYaw + normalizedPitch) / (timeDelta / 1000);

            // Appliquer lissage
            smoothedAngularSpeed = smoothValue(totalAngularSpeed, smoothedAngularSpeed, 0.4);

            lastValidYaw = newYaw;
            lastValidPitch = newPitch;

            return smoothedAngularSpeed;
        }

        // ===== ESTIMER DISTANCE =====
        function estimateDistance(start, end) {
            try {
                const faceWidth = Math.sqrt(
                    Math.pow(end[0] - start[0], 2) + 
                    Math.pow(end[1] - start[1], 2)
                );

                const estimatedDistance = (150 / Math.max(faceWidth, 0.01)) * 50;
                return Math.max(20, Math.min(200, estimatedDistance));
            } catch (err) {
                return 50;
            }
        }

        // ===== CALCULER TAILLE LETTRE =====
        function calculateLetterSize() {
            const pixelPerDegree = 60;
            const size = (acuityLevel / 10) * pixelPerDegree * (currentDistance / refDistance);
            return size;
        }

        // ===== VÉRIFIER SI ON DOIT AFFICHER LA LETTRE =====
        function shouldDisplayLetter(angularSpeed) {
            const now = Date.now();
            const cooldownOver = now - lastLetterDisplayTime > cooldown;

            // ✅ SEUL CRITÈRE : vitesse entre min et max ET cooldown écoulé
            const isSpeedValid = angularSpeed >= minSpeed && angularSpeed <= maxSpeed;
            
            return cooldownOver && isSpeedValid;
        }

        // ===== DÉMARRER CAMÉRA =====
        async function startCamera() {
            try {
                log('statVideo', '⏳ Activation caméra...');

                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: { 
                        facingMode: 'user', 
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                video.srcObject = stream;
                log('statVideo', '✅ Caméra activée', 'success');

                video.onloadedmetadata = async () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    console.log(`Résolution: ${canvas.width}x${canvas.height}`);

                    const ok = await initBlazeFace();
                    if (ok) {
                        statusDiv.style.display = 'none';
                        controlPanel.classList.add('show');
                        initialized = true;
                        animate();
                    } else {
                        statusDiv.innerHTML = `
                            <div style="font-size: 40px; margin-bottom: 15px;">❌</div>
                            <div>Erreur chargement</div>
                        `;
                    }
                };
            } catch (err) {
                log('statVideo', `❌ ${err.message}`, 'error');
                statusDiv.innerHTML = `
                    <div style="font-size: 40px; margin-bottom: 15px;">❌</div>
                    <div>${err.message}</div>
                `;
            }
        }

        // ===== BOUCLE ANIMATION =====
        async function animate() {
            try {
                if (video.readyState === video.HAVE_ENOUGH_DATA && detector) {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const predictions = await detector.estimateFaces(canvas, false);

                    if (predictions && predictions.length > 0) {
                        const face = predictions[0];
                        const landmarks = face.landmarks;
                        const start = face.start;
                        const end = face.end;

                        if (landmarks) {
                            const angles = calculateHeadAngles(landmarks);
                            
                            if (angles) {
                                const now = Date.now();
                                const timeDelta = now - lastYawTime;

                                if (timeDelta > 0) {
                                    currentAngularSpeed = calculateAngularVelocityImproved(
                                        angles.yaw,
                                        angles.pitch,
                                        timeDelta
                                    );

                                    // ✅ AFFICHER LETTRE SI VITESSE VALIDE
                                    if (shouldDisplayLetter(currentAngularSpeed)) {
                                        currentDistance = estimateDistance(start, end);
                                        currentLetterSize = calculateLetterSize();
                                        currentLetter = letters[Math.floor(Math.random() * letters.length)];
                                        letterDisplay.textContent = currentLetter;
                                        letterDisplay.style.fontSize = currentLetterSize + 'px';
                                        letterDisplay.style.opacity = '1';
                                        lastLetterTime = now;
                                        lastLetterDisplayTime = now;
                                        letterDisplayStartTime = now;
                                        
                                        console.log(`✅ LETTRE: ${currentLetter} | Vitesse: ${Math.round(currentAngularSpeed)}°/s | Affichée pendant ${displayTime}ms`);
                                    }

                                    // ✅ MASQUER APRÈS displayTime ms EXACTEMENT
                                    if (currentLetter && letterDisplayStartTime > 0) {
                                        const elapsedTime = now - letterDisplayStartTime;
                                        
                                        if (elapsedTime >= displayTime && letterDisplay.style.opacity !== '0') {
                                            letterDisplay.style.opacity = '0';
                                            console.log(`🔲 MASQUÉE après ${elapsedTime}ms`);
                                            letterDisplayStartTime = 0;
                                        }
                                    }

                                    // Lissage angles affichés
                                    smoothedYaw = smoothValue(angles.yaw, smoothedYaw, 0.3);
                                    smoothedPitch = smoothValue(angles.pitch, smoothedPitch, 0.3);
                                    currentYaw = smoothedYaw;
                                    currentPitch = smoothedPitch;
                                }

                                log('statDetection', '✅ Visage détecté', 'success');
                            }
                        }
                    } else {
                        log('statDetection', '❌ Aucun visage');
                    }

                    frameCount++;
                    const now = Date.now();
                    if (now - lastFPSTime > 1000) {
                        fps = frameCount;
                        frameCount = 0;
                        lastFPSTime = now;
                    }

                    updateStats();
                }
                requestAnimationFrame(animate);
            } catch (e) {
                console.error('Animation error:', e);
                requestAnimationFrame(animate);
            }
        }

        // ===== METTRE À JOUR STATISTIQUES =====
        function updateStats() {
            document.getElementById('statYaw').textContent = `Yaw: ${currentYaw.toFixed(1)}°`;
            document.getElementById('statPitch').textContent = `Pitch: ${currentPitch.toFixed(1)}°`;
            document.getElementById('statAngularSpeed').textContent = `Vitesse: ${Math.round(currentAngularSpeed)}°/s`;
            
            const now = Date.now();
            const cooldownRemaining = Math.max(0, cooldown - (now - lastLetterDisplayTime));
            document.getElementById('statCooldown').textContent = `Cooldown: ${Math.round(cooldownRemaining)}ms`;
            
            // ✅ Affiche le temps d'affichage
            let displayedTime = 0;
            if (letterDisplayStartTime > 0) {
                displayedTime = now - letterDisplayStartTime;
            }
            document.getElementById('statDisplayTime').textContent = `Affichée: ${Math.round(displayedTime)}ms`;
            
            document.getElementById('statDistance').textContent = `Distance: ~${Math.round(currentDistance)}cm`;
            document.getElementById('statLetter').textContent = `Lettre: ${currentLetter || '--'}`;
            document.getElementById('statSize').textContent = `Taille: ${Math.round(currentLetterSize)}px`;
            document.getElementById('statFPS').textContent = `FPS: ${fps}`;
        }

        // ===== CONTRÔLES DES PARAMÈTRES =====
        document.getElementById('displayTime').addEventListener('input', (e) => {
            displayTime = parseInt(e.target.value);
            document.getElementById('dispVal').textContent = displayTime;
        });

        document.getElementById('letterSize').addEventListener('input', (e) => {
            acuityLevel = parseFloat(e.target.value);
            document.getElementById('sizeVal').textContent = acuityLevel.toFixed(1);
        });

        document.getElementById('cooldown').addEventListener('input', (e) => {
            cooldown = parseInt(e.target.value);
            document.getElementById('cooldownVal').textContent = cooldown;
        });

        document.getElementById('minSpeed').addEventListener('input', (e) => {
            minSpeed = parseInt(e.target.value);
            document.getElementById('minSpeedVal').textContent = minSpeed;
            if (minSpeed >= maxSpeed) {
                maxSpeed = minSpeed + 50;
                document.getElementById('maxSpeed').value = maxSpeed;
                document.getElementById('maxSpeedVal').textContent = maxSpeed;
            }
        });

        document.getElementById('maxSpeed').addEventListener('input', (e) => {
            maxSpeed = parseInt(e.target.value);
            document.getElementById('maxSpeedVal').textContent = maxSpeed;
            if (maxSpeed <= minSpeed) {
                minSpeed = maxSpeed - 50;
                document.getElementById('minSpeed').value = minSpeed;
                document.getElementById('minSpeedVal').textContent = minSpeed;
            }
        });

        document.getElementById('refDistance').addEventListener('input', (e) => {
            refDistance = parseInt(e.target.value);
            document.getElementById('distVal').textContent = refDistance;
        });

        // ===== DÉMARRER =====
        startCamera();
    </script>
</body>
</html>
